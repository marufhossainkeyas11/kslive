<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Lanka A vs India A - Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
  h2 { color: #fff; margin-bottom: 12px; font-size: 15px; text-align: center; padding: 0 10px; }
  video { width: 100%; max-width: 900px; background: #000; border-radius: 8px; }
  #status { color: #aaa; margin-top: 10px; font-size: 13px; }
</style>
</head>
<body>

<h2>🏏 Tri Nation A Series – Sri Lanka A vs India A (LIVE)</h2>
<video id="v" controls></video>
<p id="status">Initializing...</p>

<!-- dash.js jsdelivr CDN থেকে নেওয়া -->
<script src="https://cdn.jsdelivr.net/npm/dashjs@4.7.4/dist/dash.all.min.js"></script>
<script>
  const MPD_URL = "https://a57live-pv-ta-amazon.akamaized.net/iad-nitro/live/clients/dash/enc/ldgnvordfu/out/v1/430b37000b9148379747ac5cfb2ada46/cenc.mpd";
  const KEY_ID  = "3aa6f9df41c299f659aaee15d0067900";
  const KEY_VAL = "0434703fb407fb12980f51944271a1f8";

  function hexToBase64url(hex) {
    const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
    return btoa(String.fromCharCode(...bytes))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  const kid_b64 = hexToBase64url(KEY_ID);
  const key_b64 = hexToBase64url(KEY_VAL);

  const clearKeyJson = JSON.stringify({
    keys: [{ kty: "oct", kid: kid_b64, k: key_b64 }],
    type: "temporary"
  });
  const licenseUrl = "data:application/json;base64," + btoa(clearKeyJson);

  const video  = document.getElementById("v");
  const status = document.getElementById("status");

  const player = dashjs.MediaPlayer().create();

  player.setProtectionData({
    "org.w3.clearkey": {
      serverURL: licenseUrl
    }
  });

  player.attachView(video);
  player.attachSource(MPD_URL);

  player.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
    status.textContent = "✅ Stream loaded!";
  });

  player.on(dashjs.MediaPlayer.events.ERROR, (e) => {
    const msg = e?.error?.message || e?.error?.code || JSON.stringify(e?.error);
    status.textContent = "❌ " + msg;
    console.error("DASH ERROR:", e);
  });
</script>

</body>
</html>
